<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Second Brain Knowledge Graph</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f4f7fb;
      color: #1f2937;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .hero {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }

    .hero-main {
      background: linear-gradient(135deg, #0f172a, #111827, #1e293b);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hero-main h1 {
      font-size: 34px;
      margin: 8px 0;
    }

    .hero-main p {
      color: #cbd5e1;
      line-height: 1.5;
      max-width: 620px;
    }

    .mini-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .stat-value {
      font-size: 34px;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .primary-btn {
      background: white;
      color: #111827;
      font-weight: bold;
    }

    .primary-btn:hover {
      background: #e5e7eb;
    }

    .secondary-btn {
      background: #111827;
      color: white;
    }

    .secondary-btn:hover {
      background: #1f2937;
    }

    .outline-btn {
      background: white;
      color: #111827;
      border: 1px solid #d1d5db;
    }

    .outline-btn:hover {
      background: #f9fafb;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 320px 1fr 360px;
      gap: 20px;
      align-items: start;
    }

    .section-title {
      font-size: 20px;
      margin-bottom: 14px;
      font-weight: bold;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .metric-box {
      background: #f3f4f6;
      border-radius: 16px;
      padding: 14px;
    }

    .metric-box .label {
      color: #6b7280;
      font-size: 12px;
    }

    .metric-box .value {
      font-size: 24px;
      font-weight: bold;
      margin-top: 6px;
    }

    .notes-list,
    .link-list,
    .backlink-list,
    .link-selector {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 520px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .note-item,
    .mini-note,
    .link-option {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 14px;
      background: white;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .note-item:hover,
    .mini-note:hover,
    .link-option:hover {
      background: #f9fafb;
    }

    .note-item.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .note-item.active .muted,
    .note-item.active .note-count {
      color: #cbd5e1;
    }

    .note-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .note-title {
      font-weight: bold;
      font-size: 16px;
    }

    .muted {
      color: #6b7280;
      font-size: 14px;
      line-height: 1.45;
      margin-top: 6px;
    }

    .note-count {
      color: #9ca3af;
      font-size: 12px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag {
      background: #eef2ff;
      color: #3730a3;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .graph-wrapper {
      background: linear-gradient(135deg, #020617, #0f172a, #111827);
      border-radius: 24px;
      padding: 14px;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 460px;
      display: block;
    }

    .editor {
      margin-top: 20px;
      display: none;
    }

    .editor.show {
      display: block;
    }

    .editor .field {
      margin-bottom: 14px;
    }

    .editor label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .editor-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .selected-note h2 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .selected-note p {
      line-height: 1.7;
      margin-top: 14px;
      white-space: pre-wrap;
    }

    .time-text {
      color: #6b7280;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.6;
    }

    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .empty {
      text-align: center;
      padding: 24px;
      color: #6b7280;
      border: 1px dashed #d1d5db;
      border-radius: 16px;
    }

    .link-option.selected {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="card hero-main">
        <div>
          <div class="mini-label">Second Brain</div>
          <h1>Knowledge Graph Workspace</h1>
          <p>Capture ideas, connect related concepts, and explore your thoughts like a visual knowledge network.</p>
        </div>
        <button class="primary-btn" id="newNoteBtn">+ New Note</button>
      </div>
      <div class="card">
        <div class="mini-label">Notes</div>
        <div class="stat-value" id="notesCount">0</div>
      </div>
      <div class="card">
        <div class="mini-label">Connections</div>
        <div class="stat-value" id="connectionsCount">0</div>
      </div>
    </div>

    <div class="main-grid">
      <div>
        <div class="card">
          <div class="section-title">Search Notes</div>
          <input type="text" id="searchInput" placeholder="Search title, content, tags..." />
          <div class="metrics">
            <div class="metric-box">
              <div class="label">Visible</div>
              <div class="value" id="visibleCount">0</div>
            </div>
            <div class="metric-box">
              <div class="label">Tags</div>
              <div class="value" id="tagsCount">0</div>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top: 18px;">
          <div class="section-title">All Notes</div>
          <div class="notes-list" id="notesList"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="section-title">Graph View</div>
          <div class="graph-wrapper">
            <svg id="graphSvg" viewBox="0 0 760 460"></svg>
          </div>
        </div>

        <div class="card editor" id="editorPanel">
          <div class="section-title" id="editorTitle">Create Note</div>

          <div class="field">
            <label for="titleInput">Title</label>
            <input type="text" id="titleInput" placeholder="Enter note title" />
          </div>

          <div class="field">
            <label for="contentInput">Content</label>
            <textarea id="contentInput" placeholder="Write your idea, summary, or concept..."></textarea>
          </div>

          <div class="field">
            <label for="tagsInput">Tags</label>
            <input type="text" id="tagsInput" placeholder="AI, Research, Workflow" />
          </div>

          <div class="field">
            <label>Connect Related Notes</label>
            <div class="link-selector" id="linkSelector"></div>
          </div>

          <div class="editor-actions">
            <button class="secondary-btn" id="saveBtn">Save</button>
            <button class="outline-btn" id="cancelBtn">Cancel</button>
          </div>
        </div>
      </div>

      <div>
        <div class="card selected-note">
          <div class="section-title">Selected Note</div>
          <div id="selectedNoteContent"></div>
        </div>

        <div class="card" style="margin-top: 18px;">
          <div class="section-title">Linked Notes</div>
          <div class="link-list" id="linkedNotes"></div>
        </div>

        <div class="card" style="margin-top: 18px;">
          <div class="section-title">Backlinks</div>
          <div class="backlink-list" id="backlinks"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'second-brain-html-css-js-v1';

    const starterNotes = [
      {
        id: '1',
        title: 'Machine Learning',
        content: 'A field of AI focused on building systems that learn from data.',
        tags: ['AI', 'Core'],
        links: ['2', '3'],
        createdAt: Date.now() - 100000,
        updatedAt: Date.now() - 100000
      },
      {
        id: '2',
        title: 'Neural Networks',
        content: 'A class of models inspired by interconnected neurons, widely used in deep learning.',
        tags: ['AI', 'Deep Learning'],
        links: ['1', '3'],
        createdAt: Date.now() - 90000,
        updatedAt: Date.now() - 90000
      },
      {
        id: '3',
        title: 'Data Preprocessing',
        content: 'Cleaning, normalizing, and transforming raw data before feeding it into models.',
        tags: ['Data', 'Workflow'],
        links: ['1'],
        createdAt: Date.now() - 80000,
        updatedAt: Date.now() - 80000
      },
      {
        id: '4',
        title: 'Personal Productivity',
        content: 'Systems and habits that improve consistency, focus, and output quality.',
        tags: ['Self', 'Habits'],
        links: ['5'],
        createdAt: Date.now() - 70000,
        updatedAt: Date.now() - 70000
      },
      {
        id: '5',
        title: 'Atomic Habits',
        content: 'Small changes repeated over time can compound into meaningful long-term results.',
        tags: ['Books', 'Habits'],
        links: ['4'],
        createdAt: Date.now() - 60000,
        updatedAt: Date.now() - 60000
      }
    ];

    let notes = [];
    let selectedId = null;
    let searchText = '';
    let editingId = null;
    let selectedLinks = [];

    const notesCount = document.getElementById('notesCount');
    const connectionsCount = document.getElementById('connectionsCount');
    const visibleCount = document.getElementById('visibleCount');
    const tagsCount = document.getElementById('tagsCount');
    const notesList = document.getElementById('notesList');
    const selectedNoteContent = document.getElementById('selectedNoteContent');
    const linkedNotes = document.getElementById('linkedNotes');
    const backlinks = document.getElementById('backlinks');
    const graphSvg = document.getElementById('graphSvg');
    const editorPanel = document.getElementById('editorPanel');
    const editorTitle = document.getElementById('editorTitle');
    const titleInput = document.getElementById('titleInput');
    const contentInput = document.getElementById('contentInput');
    const tagsInput = document.getElementById('tagsInput');
    const linkSelector = document.getElementById('linkSelector');
    const searchInput = document.getElementById('searchInput');

    function uid() {
      return Math.random().toString(36).slice(2, 10);
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function loadNotes() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        notes = Array.isArray(saved) && saved.length ? saved : starterNotes;
      } catch (e) {
        notes = starterNotes;
      }
    }

    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleString();
    }

    function truncate(text, len = 72) {
      return text.length > len ? text.slice(0, len) + '...' : text;
    }

    function getFilteredNotes() {
      const q = searchText.trim().toLowerCase();
      if (!q) return notes;
      return notes.filter(note => {
        const combined = [note.title, note.content, ...(note.tags || [])].join(' ').toLowerCase();
        return combined.includes(q);
      });
    }

    function getSelectedNote() {
      return notes.find(note => note.id === selectedId) || null;
    }

    function renderStats() {
      const filteredNotes = getFilteredNotes();
      const uniqueTags = new Set(notes.flatMap(note => note.tags));
      const totalConnections = notes.reduce((sum, note) => sum + note.links.length, 0);

      notesCount.textContent = notes.length;
      connectionsCount.textContent = totalConnections;
      visibleCount.textContent = filteredNotes.length;
      tagsCount.textContent = uniqueTags.size;
    }

    function renderNotesList() {
      const filteredNotes = getFilteredNotes();
      notesList.innerHTML = '';

      if (!filteredNotes.length) {
        notesList.innerHTML = '<div class="empty">No notes match your search.</div>';
        return;
      }

      filteredNotes.forEach(note => {
        const div = document.createElement('div');
        div.className = 'note-item' + (note.id === selectedId ? ' active' : '');
        div.innerHTML = `
          <div class="note-top">
            <div>
              <div class="note-title">${escapeHtml(note.title)}</div>
              <div class="muted">${escapeHtml(truncate(note.content, 72))}</div>
            </div>
            <div class="note-count">${note.links.length}</div>
          </div>
          <div class="tags">
            ${note.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
          </div>
        `;
        div.onclick = () => {
          selectedId = note.id;
          renderApp();
        };
        notesList.appendChild(div);
      });
    }

    function renderSelectedNote() {
      const note = getSelectedNote();
      if (!note) {
        selectedNoteContent.innerHTML = '<div class="empty">Select a note to inspect it.</div>';
        linkedNotes.innerHTML = '<div class="empty">No outgoing links.</div>';
        backlinks.innerHTML = '<div class="empty">No backlinks yet.</div>';
        return;
      }

      selectedNoteContent.innerHTML = `
        <h2>${escapeHtml(note.title)}</h2>
        <div class="tags">
          ${note.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
        </div>
        <p>${escapeHtml(note.content)}</p>
        <div class="time-text">
          Created: ${formatDate(note.createdAt)}<br>
          Updated: ${formatDate(note.updatedAt)}
        </div>
        <div class="action-row">
          <button class="secondary-btn" onclick="startEdit()">Edit</button>
          <button class="outline-btn" onclick="deleteNote()">Delete</button>
        </div>
      `;

      const outgoing = notes.filter(n => note.links.includes(n.id));
      const incoming = notes.filter(n => n.links.includes(note.id));

      linkedNotes.innerHTML = outgoing.length
        ? outgoing.map(n => `
          <div class="mini-note" onclick="selectNote('${n.id}')">
            <div class="note-title">${escapeHtml(n.title)}</div>
            <div class="muted">${escapeHtml(truncate(n.content, 60))}</div>
          </div>
        `).join('')
        : '<div class="empty">No outgoing links.</div>';

      backlinks.innerHTML = incoming.length
        ? incoming.map(n => `
          <div class="mini-note" onclick="selectNote('${n.id}')">
            <div class="note-title">${escapeHtml(n.title)}</div>
            <div class="muted">References this note</div>
          </div>
        `).join('')
        : '<div class="empty">No backlinks yet.</div>';
    }

    function renderGraph() {
      const filteredNotes = getFilteredNotes();
      const filteredIds = new Set(filteredNotes.map(n => n.id));
      const width = 760;
      const height = 460;
      const centerX = width / 2;
      const centerY = height / 2;
      const radius = Math.min(width, height) / 2 - 70;

      const positions = {};
      filteredNotes.forEach((note, index) => {
        const angle = (Math.PI * 2 * index) / Math.max(filteredNotes.length, 1) - Math.PI / 2;
        const wobble = 24 * Math.sin(index * 1.7);
        positions[note.id] = {
          x: centerX + (radius + wobble) * Math.cos(angle),
          y: centerY + (radius - wobble / 2) * Math.sin(angle)
        };
      });

      let svgContent = `
        <defs>
          <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.12)"></stop>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"></stop>
          </radialGradient>
        </defs>
        <circle cx="${centerX}" cy="${centerY}" r="140" fill="url(#bgGlow)"></circle>
      `;

      filteredNotes.forEach(note => {
        note.links.forEach(targetId => {
          if (filteredIds.has(targetId) && positions[note.id] && positions[targetId]) {
            const active = selectedId === note.id || selectedId === targetId;
            svgContent += `
              <line
                x1="${positions[note.id].x}"
                y1="${positions[note.id].y}"
                x2="${positions[targetId].x}"
                y2="${positions[targetId].y}"
                stroke="${active ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.18)'}"
                stroke-width="${active ? '2.2' : '1.2'}"
              ></line>
            `;
          }
        });
      });

      filteredNotes.forEach(note => {
        const pos = positions[note.id];
        const degree = note.links.filter(id => filteredIds.has(id)).length;
        const nodeRadius = degree >= 5 ? 28 : degree >= 3 ? 24 : degree >= 1 ? 20 : 16;
        const isActive = selectedId === note.id;
        const label = note.title.length > 14 ? note.title.slice(0, 14) + '…' : note.title;

        svgContent += `
          <g onclick="selectNote('${note.id}')" style="cursor:pointer;">
            <circle
              cx="${pos.x}"
              cy="${pos.y}"
              r="${isActive ? nodeRadius + 8 : nodeRadius}"
              fill="${isActive ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.08)'}"
              stroke="${isActive ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.35)'}"
              stroke-width="${isActive ? '2.5' : '1.2'}"
            ></circle>
            <text
              x="${pos.x}"
              y="${pos.y + 4}"
              fill="white"
              font-size="${isActive ? 13 : 11}"
              font-weight="${isActive ? 700 : 500}"
              text-anchor="middle"
            >${escapeHtml(label)}</text>
          </g>
        `;
      });

      graphSvg.innerHTML = svgContent;
    }

    function renderLinkSelector() {
      linkSelector.innerHTML = '';
      const availableNotes = notes.filter(note => note.id !== editingId);

      if (!availableNotes.length) {
        linkSelector.innerHTML = '<div class="empty">No notes available.</div>';
        return;
      }

      availableNotes.forEach(note => {
        const div = document.createElement('div');
        div.className = 'link-option' + (selectedLinks.includes(note.id) ? ' selected' : '');
        div.innerHTML = `
          <div class="note-title">${escapeHtml(note.title)}</div>
          <div class="muted">${escapeHtml(note.tags.slice(0, 2).join(', '))}</div>
        `;
        div.onclick = () => {
          if (selectedLinks.includes(note.id)) {
            selectedLinks = selectedLinks.filter(id => id !== note.id);
          } else {
            selectedLinks.push(note.id);
          }
          renderLinkSelector();
        };
        linkSelector.appendChild(div);
      });
    }

    function showEditor(createMode = true) {
      editorPanel.classList.add('show');
      editorTitle.textContent = createMode ? 'Create Note' : 'Edit Note';
      renderLinkSelector();
    }

    function hideEditor() {
      editorPanel.classList.remove('show');
      editingId = null;
      selectedLinks = [];
      titleInput.value = '';
      contentInput.value = '';
      tagsInput.value = '';
    }

    function startCreate() {
      editingId = null;
      selectedLinks = selectedId ? [selectedId] : [];
      titleInput.value = '';
      contentInput.value = '';
      tagsInput.value = '';
      showEditor(true);
    }

    function startEdit() {
      const note = getSelectedNote();
      if (!note) return;
      editingId = note.id;
      selectedLinks = [...note.links];
      titleInput.value = note.title;
      contentInput.value = note.content;
      tagsInput.value = note.tags.join(', ');
      showEditor(false);
    }

    function saveCurrentNote() {
      const title = titleInput.value.trim();
      const content = contentInput.value.trim();
      const tags = tagsInput.value.split(',').map(tag => tag.trim()).filter(Boolean);

      if (!title || !content) {
        alert('Please enter both title and content.');
        return;
      }

      if (editingId) {
        notes = notes.map(note => {
          if (note.id === editingId) {
            return {
              ...note,
              title,
              content,
              tags,
              links: selectedLinks.filter(id => id !== editingId),
              updatedAt: Date.now()
            };
          }
          return note;
        });
        selectedId = editingId;
      } else {
        const id = uid();
        notes.unshift({
          id,
          title,
          content,
          tags,
          links: [...selectedLinks],
          createdAt: Date.now(),
          updatedAt: Date.now()
        });
        selectedId = id;
      }

      saveNotes();
      hideEditor();
      renderApp();
    }

    function deleteNote() {
      const note = getSelectedNote();
      if (!note) return;

      notes = notes
        .filter(n => n.id !== note.id)
        .map(n => ({ ...n, links: n.links.filter(id => id !== note.id) }));

      selectedId = notes[0] ? notes[0].id : null;
      saveNotes();
      renderApp();
    }

    function selectNote(id) {
      selectedId = id;
      renderApp();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderApp() {
      const filteredNotes = getFilteredNotes();
      if (!filteredNotes.find(note => note.id === selectedId)) {
        selectedId = filteredNotes[0] ? filteredNotes[0].id : (notes[0] ? notes[0].id : null);
      }

      renderStats();
      renderNotesList();
      renderSelectedNote();
      renderGraph();
      if (editorPanel.classList.contains('show')) renderLinkSelector();
    }

    document.getElementById('newNoteBtn').addEventListener('click', startCreate);
    document.getElementById('saveBtn').addEventListener('click', saveCurrentNote);
    document.getElementById('cancelBtn').addEventListener('click', hideEditor);
    searchInput.addEventListener('input', e => {
      searchText = e.target.value;
      renderApp();
    });

    loadNotes();
    selectedId = notes[0] ? notes[0].id : null;
    renderApp();

    window.startEdit = startEdit;
    window.deleteNote = deleteNote;
    window.selectNote = selectNote;
  </script>
</body>
</html>
