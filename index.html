
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Second Brain Knowledge Graph</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="container">
  <div class="hero">
    <div class="card hero-main">
      <div>
        <div class="mini-label">Second Brain</div>
        <h1>Knowledge Graph Workspace</h1>
        <p>Connect ideas visually like a brain.</p>
      </div>
      <button id="newNoteBtn">+ New Note</button>
    </div>
    <div class="card">
      <div class="mini-label">Notes</div>
      <div id="notesCount">0</div>
    </div>
    <div class="card">
      <div class="mini-label">Connections</div>
      <div id="connectionsCount">0</div>
    </div>
  </div>
  <div class="main-grid">
    <div>
      <div class="card">
        <input id="searchInput" placeholder="Search..."/>
      </div>
      <div class="card">
        <div id="notesList"></div>
      </div>
    </div>
    <div>
      <div class="card">
        <svg id="graphSvg"></svg>
      </div>
      <div class="card editor" id="editorPanel">
        <input id="titleInput" placeholder="Title"/>
        <textarea id="contentInput"></textarea>
        <input id="tagsInput" placeholder="tags"/>
        <button id="saveBtn">Save</button>
        <button id="cancelBtn">Cancel</button>
      </div>
    </div>
    <div>
      <div class="card" id="selectedNoteContent"></div>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
